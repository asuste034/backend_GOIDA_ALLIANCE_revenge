services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_1029
      POSTGRES_DB: GOIDADB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:test_1029@db:5432/GOIDADB
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://app:9000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
volumes:
  pgdata:
